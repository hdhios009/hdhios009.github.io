<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TopUpBot — пополнение игр</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#f5f7fa;color:#1a1a2e;min-height:100vh;padding-bottom:80px}

/* Header */
.header{background:linear-gradient(135deg,#1e90ff,#00bfff);color:white;padding:40px 20px 30px;text-align:center;border-radius:0 0 24px 24px}
.header h1{font-size:1.8rem;margin-bottom:5px}
.header p{font-size:.9rem;opacity:.85}
.header .balance{display:inline-block;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);padding:8px 20px;border-radius:50px;margin-top:12px;font-size:.85rem}
.header .balance strong{font-size:1.1rem}

/* Categories */
.categories{padding:16px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;margin-top:-10px}
.categories::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;background:white;border:2px solid #e8ecf0;padding:10px 18px;border-radius:50px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;color:#555}
.cat-btn.active,.cat-btn:hover{background:#1e90ff;color:white;border-color:#1e90ff}

/* Search */
.search-wrap{padding:0 16px;margin-bottom:12px}
.search-wrap input{width:100%;padding:12px 16px;border:2px solid #e8ecf0;border-radius:12px;font-size:.95rem;background:white;outline:none}
.search-wrap input:focus{border-color:#1e90ff}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:0 16px}
.card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:.2s;cursor:pointer;border:1px solid #e8ecf0}
.card:active{transform:scale(.97)}
.card-img{text-align:center;padding:16px 0 8px;font-size:2rem}
.card-body{padding:0 12px 12px;text-align:center}
.card-body h3{font-size:.9rem;margin-bottom:2px;color:#1a1a2e}
.card-body p{font-size:.75rem;color:#888;margin-bottom:6px}
.card-body .price{font-size:1.1rem;font-weight:700;color:#1e90ff}

/* Featured banner */
.banner{background:linear-gradient(135deg,#1e90ff,#00bfff);margin:16px;padding:20px;border-radius:16px;color:white;position:relative;overflow:hidden}
.banner h2{font-size:1.2rem;margin-bottom:5px}
.banner p{font-size:.85rem;opacity:.9;margin-bottom:10px}
.banner .btn-white{background:white;color:#1e90ff;border:none;padding:8px 20px;border-radius:50px;font-weight:600;font-size:.85rem;cursor:pointer}
.banner .emoji{position:absolute;right:10px;bottom:-5px;font-size:4rem;opacity:.3}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:white;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h2{font-size:1.2rem}
.modal-close{background:none;border:none;font-size:1.5rem;color:#999;cursor:pointer}
.modal-price{font-size:1.5rem;font-weight:700;color:#1e90ff;margin-bottom:8px}
.modal-desc{color:#666;font-size:.9rem;margin-bottom:16px;line-height:1.5}
.modal-btn{background:linear-gradient(135deg,#1e90ff,#00bfff);color:white;border:none;padding:14px;border-radius:12px;font-weight:600;font-size:1rem;cursor:pointer;width:100%;margin-top:8px}
.modal-btn:hover{opacity:.9}
.modal-btn:active{opacity:.8}
.modal-info{font-size:.8rem;color:#999;text-align:center;margin-top:12px;line-height:1.4}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e8ecf0;display:flex;justify-content:space-around;padding:8px 0;padding-bottom:env(safe-area-inset-bottom,8px)}
.nav-item{text-align:center;font-size:.7rem;color:#999;cursor:pointer;padding:4px 12px}
.nav-item.active{color:#1e90ff;font-weight:600}
.nav-item .nav-icon{font-size:1.3rem;display:block;margin-bottom:2px}
</style>
</head>
<body>

<div class="header">
  <h1>🎮 TopUpBot</h1>
  <p>Пополнение игр и сервисов</p>
  <div class="balance">👤 Доставка: <strong>2-5 минут</strong></div>
</div>

<div class="categories" id="categories"></div>

<div class="banner" onclick="openModal('steam1000')">
  <h2>🔥 Steam 1 000 ₽ — 1 100 ₽</h2>
  <p>Моментальное пополнение. Работаем 24/7</p>
  <button class="btn-white" onclick="event.stopPropagation();openModal('steam1000')">Купить</button>
  <div class="emoji">💨</div>
</div>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="🔍 Поиск товаров..." oninput="renderItems()">
</div>

<div class="grid" id="itemsGrid"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modalTitle">Товар</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalEmoji" style="font-size:3rem;text-align:center;margin:8px 0"></div>
    <div class="modal-price" id="modalPrice">0 ₽</div>
    <div class="modal-desc" id="modalDesc">Описание</div>
    <button class="modal-btn" id="modalBtn">💳 Купить</button>
    <div class="modal-info">После оплаты товар придёт в течение 2-5 минут в этот чат</div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="filterCategory('all')">
    <span class="nav-icon">🏠</span>Главная
  </div>
  <div class="nav-item" onclick="filterCategory('steam')">
    <span class="nav-icon">💨</span>Steam
  </div>
  <div class="nav-item" onclick="filterCategory('roblox')">
    <span class="nav-icon">🎮</span>Roblox
  </div>
  <div class="nav-item" onclick="filterCategory('other')">
    <span class="nav-icon">📦</span>Другое
  </div>
</div>

<script>
const items = [
  {id:"steam500",icon:"💨",name:"Steam 500 ₽",desc:"Пополнение баланса Steam",price:"550 ₽",priceNum:550,cat:"steam",badge:"🔥"},
  {id:"steam1000",icon:"💨",name:"Steam 1 000 ₽",desc:"Пополнение баланса Steam",price:"1 100 ₽",priceNum:1100,cat:"steam",badge:"🔥"},
  {id:"steam2000",icon:"💨",name:"Steam 2 000 ₽",desc:"Пополнение баланса Steam",price:"2 200 ₽",priceNum:2200,cat:"steam",badge:""},
  {id:"steam5000",icon:"💨",name:"Steam 5 000 ₽",desc:"Пополнение баланса Steam",price:"5 400 ₽",priceNum:5400,cat:"steam",badge:"💎"},
  {id:"roblox100",icon:"🎮",name:"Roblox 100 Robux",desc:"100 Robux внутри игры",price:"129 ₽",priceNum:129,cat:"roblox",badge:""},
  {id:"roblox400",icon:"🎮",name:"Roblox 400 Robux",desc:"400 Robux на аккаунт",price:"489 ₽",priceNum:489,cat:"roblox",badge:"🔥"},
  {id:"roblox1000",icon:"🎮",name:"Roblox 1 000 Robux",desc:"1000 Robux, выгодно!",price:"1 199 ₽",priceNum:1199,cat:"roblox",badge:"💎"},
  {id:"minecraft",icon:"⛏️",name:"Minecraft Java",desc:"Лицензия Java Edition",price:"449 ₽",priceNum:449,cat:"other",badge:"💎"},
  {id:"tgprem",icon:"💬",name:"Telegram Premium 1 мес",desc:"Подарки и стикеры",price:"199 ₽",priceNum:199,cat:"other",badge:""},
  {id:"discnitro",icon:"🔷",name:"Discord Nitro 1 мес",desc:"Буст, HD-видео",price:"199 ₽",priceNum:199,cat:"other",badge:""},
];

let currentCat = 'all';
let currentItem = null;

function renderItems(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = items.filter(i => {
    const matchCat = currentCat === 'all' || i.cat === currentCat;
    const matchSearch = i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
  document.getElementById('itemsGrid').innerHTML = filtered.map(item => `
    <div class="card" onclick="openModal('${item.id}')">
      ${item.badge ? `<div style="text-align:right;font-size:.7rem;color:#1e90ff;padding:6px 10px 0;font-weight:600">${item.badge}</div>` : '<div style="height:18px"></div>'}
      <div class="card-img">${item.icon}</div>
      <div class="card-body">
        <h3>${item.name}</h3>
        <p>${item.desc}</p>
        <div class="price">${item.price}</div>
      </div>
    </div>
  `).join('');
  if(!filtered.length) document.getElementById('itemsGrid').innerHTML = '<p style="text-align:center;color:#999;padding:40px">Ничего не найдено</p>';
}

function filterCategory(cat){
  currentCat = cat;
  document.querySelectorAll('.nav-item').forEach((el,i) => el.classList.toggle('active', i===0 && cat==='all' || el.textContent.includes(cat==='steam'?'Steam':cat==='roblox'?'Roblox':'Другое')));
  renderItems();
}

function openModal(id){
  const item = items.find(i => i.id === id);
  if(!item) return;
  currentItem = item;
  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('modalEmoji').textContent = item.icon;
  document.getElementById('modalPrice').textContent = item.price;
  document.getElementById('modalDesc').textContent = item.desc;
  document.getElementById('modalBtn').textContent = `💳 Купить за ${item.price}`;
  document.getElementById('modalBtn').onclick = () => buyItem(item);
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');
}

function buyItem(item){
  // Оплата через ЮKassa
  const orderId = `topup_${item.id}_${Date.now()}`;
  const payUrl = `https://money.yandex.ru/eshop.xml?shopId=1356997&sum=${item.priceNum}&orderNumber=${orderId}&target=${encodeURIComponent(item.name)}`;
  window.location.href = payUrl;
}

// Категории сверху
const cats = [
  {id:"all",label:"🔥 Всё"},
  {id:"steam",label:"💨 Steam"},
  {id:"roblox",label:"🎮 Roblox"},
  {id:"other",label:"📦 Другое"},
];
document.getElementById('categories').innerHTML = cats.map(c => 
  `<div class="cat-btn ${c.id==='all'?'active':''}" onclick="document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');currentCat='${c.id}';renderItems()">${c.label}</div>`
).join('');

renderItems();
</script>
</body>
</html>
